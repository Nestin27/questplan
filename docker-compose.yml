services:
  questplan:
    build: .
    container_name: questplan
    restart: unless-stopped
    ports:
      - "8080:4000"
    volumes:
      - questplan_data:/data
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATA_DIR=/data
      - UPLOADS_DIR=/data/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  questplan_data:
